<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flashcards Engels - Nederlands</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      color: #222;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 950px;
      margin: 30px auto;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 10px;
    }

    .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 25px;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      align-items: center;
      margin-bottom: 20px;
    }

    button, select, label {
      font-size: 16px;
    }

    select {
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid #ccc;
      background: white;
    }

    button {
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      background: #0a66c2;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #084f96;
    }

    button.danger {
      background: #c0392b;
    }

    button.danger:hover {
      background: #992d22;
    }

    .statusbar {
      text-align: center;
      margin-bottom: 18px;
      color: #444;
      font-size: 18px;
    }

    .flashcard {
      background: white;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
      padding: 40px 25px;
      text-align: center;
      min-height: 240px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      margin-bottom: 20px;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .flashcard:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 28px rgba(0,0,0,0.10);
    }

    .label {
      font-size: 14px;
      color: #777;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .word {
      font-size: 34px;
      font-weight: bold;
      margin-bottom: 16px;
      word-break: break-word;
    }

    .translation {
      font-size: 24px;
      color: #0a66c2;
      min-height: 34px;
      word-break: break-word;
    }

    .checkbox-row {
      display: flex;
      justify-content: center;
      margin: 15px 0 25px;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .known-list {
      background: white;
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.06);
      margin-top: 20px;
    }

    .known-list h2 {
      margin-top: 0;
      font-size: 20px;
    }

    .known-items {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .tag {
      background: #e8f1fb;
      color: #0a66c2;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 14px;
    }

    .empty {
      color: #777;
      font-style: italic;
    }

    @media (max-width: 600px) {
      .word {
        font-size: 28px;
      }

      .translation {
        font-size: 20px;
      }

      .controls {
        flex-direction: column;
      }

      button, select {
        width: 100%;
        max-width: 320px;
      }
    }
  </style>
</head>
<body>

    <h1>Flashcards Engels - Nederlands</h1>
    <div class="subtitle">Klik op de kaart om het antwoord te tonen of te verbergen.</div>

    <div class="controls">
      <select id="directionSelect">

        <option value="nl-en">Nederlands → Engels</option>

    <div class="statusbar">

    <div class="flashcard" id="flashcard">

      <div class="word" id="questionWord">-</div>
      <div class="translation" id="answerWord">&nbsp;</div>

    <div class="checkbox-row">

      <div id="knownItems" class="known-items"></div>

    const nextBtn = document.getElementById("nextBtn");

    let currentWord = null;
    let answerVisible = false;

    function getKnownWords() {
      const saved = localStorage.getItem(STORAGE_KEY);
      return saved ? JSON.parse(saved) : [];
    }

    function saveKnownWords(ids) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(ids));
    }

    function getUnknownWords() {
      const knownIds = getKnownWords();
      return words.filter(word => !knownIds.includes(word.id));
    }

    function shuffle(array) {
      const copy = [...array];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function updateRemainingCount() {
      remainingCount.textContent = getUnknownWords().length;
    }

    function updateKnownList() {
      const knownIds = getKnownWords();
      const knownWords = words.filter(w => knownIds.includes(w.id));

      knownItems.innerHTML = "";

      if (knownWords.length === 0) {
        const p = document.createElement("div");
        p.className = "empty";
        p.textContent = "Nog geen woorden aangevinkt.";
        knownItems.appendChild(p);
        return;
      }

      knownWords
        .sort((a, b) => a.id - b.id)
        .forEach(word => {
          const span = document.createElement("span");
          span.className = "tag";
          span.textContent = `${word.en} = ${word.nl}`;
          knownItems.appendChild(span);
        });
    }

    function setCard(word, showAnswer = false) {
      currentWord = word;
      answerVisible = showAnswer;

      const direction = directionSelect.value;

      if (direction === "en-nl") {
        questionLabel.textContent = "Engels";
        questionWord.textContent = word.en;
        answerWord.textContent = showAnswer ? word.nl : " ";
      } else {
        questionLabel.textContent = "Nederlands";
        questionWord.textContent = word.nl;
        answerWord.textContent = showAnswer ? word.en : " ";
      }

      const knownIds = getKnownWords();
      knownCheckbox.checked = knownIds.includes(word.id);
      updateRemainingCount();
    }

    function toggleAnswer() {
      if (!currentWord) return;
      setCard(currentWord, !answerVisible);
    }
