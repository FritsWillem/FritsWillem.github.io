<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Flashcards EN-NL / NL-EN</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #f4f4f4;
      padding: 32px 16px;
    }
    .container {
      max-width: 520px;
      margin: 0 auto;
    }
    h1 { margin-top: 0; }
    .meta {
      color: #666;
      font-size: 14px;
      margin: 8px 0 18px;
      line-height: 1.4;
    }
    .controls {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }
    select, button {
      padding: 10px 12px;
      font-size: 16px;
      cursor: pointer;
    }
    .card {
      background: white;
      margin: 0 auto 10px;
      padding: 28px 20px;
      border-radius: 12px;
      font-size: 24px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.10);
      cursor: pointer;
      user-select: none;
      line-height: 1.35;
      min-height: 110px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .knownRow {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
      color: #333;
      font-size: 14px;
    }
    .knownRow input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
    }
    .statusline {
      color: #444;
      font-size: 14px;
      margin-top: 8px;
    }
    .hint {
      font-size: 12px;
      color: #777;
      margin-top: 4px;
    }
    kbd {
      background: #eee;
      border-radius: 4px;
      padding: 2px 6px;
      border: 1px solid #ddd;
      font-size: 12px;
    }
    .emptyState {
      color: #555;
      font-size: 14px;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📘 Flashcards</h1>

    <div class="meta">
      Kies de richting: <b>Engels → Nederlands</b> of <b>Nederlands → Engels</b>.<br/>
      Klik op de kaart om te flippen.
    </div>

    <div class="controls">
      <select id="direction" onchange="setDirection(this.value)">
        <option value="EN_NL">Engels → Nederlands</option>
        <option value="NL_EN">Nederlands → Engels</option>
      </select>

      <button onclick="prevCard()">Vorige</button>
      <button onclick="nextCard()">Volgende</button>
      <button onclick="shuffleCards()">Shuffle</button>
      <button onclick="resetOrder()">Reset</button>
      <button onclick="clearKnown()">Bekenden wissen</button>
    </div>

    <div class="card" onclick="flipCard()" title="Klik om te flippen">
      <div id="cardText">experiment</div>
    </div>

    <div class="knownRow">
      <label style="display:flex; align-items:center; gap:8px;">
        <input id="knownCheckbox" type="checkbox" onchange="toggleKnown(this.checked)" />
        Ik ken dit woord (niet meer vragen)
      </label>
    </div>

    <div class="statusline" id="statusLine"></div>
    <div class="emptyState" id="emptyState" style="display:none;"></div>

    <div class="hint">
      Sneltoetsen: <kbd>Spatie</kbd> flip • <kbd>←</kbd> vorige • <kbd>→</kbd> volgende
    </div>
  </div>

  <script>
    // Nieuwe woordenlijst (van jouw foto)
    const baseCards = [
      { en: "experiment",     nl: "experiment" },
      { en: "consideration",  nl: "overweging" },
      { en: "strange",        nl: "vreemd" },
      { en: "code",           nl: "code" },
      { en: "possibly",       nl: "mogelijk" },
      { en: "threat",         nl: "bedreiging" },
      { en: "accident",       nl: "ongeluk" },
      { en: "impossible",     nl: "onmogelijk" },
      { en: "revenue",        nl: "omzet" },
      { en: "to enable",      nl: "mogelijk maken" },
      { en: "afraid",         nl: "bang" },
      { en: "active",         nl: "actief" },
      { en: "to conclude",    nl: "concluderen" },
      { en: "religious",      nl: "religieus; godsdienstig" },
      { en: "cancer",         nl: "kanker" },
      { en: "to convince",    nl: "overtuigen" },
      { en: "to vary",        nl: "variëren" },
      { en: "environmental",  nl: "milieu" },
      { en: "sun",            nl: "zon" },
      { en: "healthy",        nl: "gezond" }
    ];

    // ---------------------------
    // Bekend-woorden functionaliteit
    // ---------------------------
    const STORAGE_KEY = "flashcards_known_v1";

    function cardId(card) {
      // Unieke sleutel per kaart
      return `${card.en}||${card.nl}`;
    }

    function loadKnownSet() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        const arr = raw ? JSON.parse(raw) : [];
        return new Set(arr);
      } catch {
        return new Set();
      }
    }

    function saveKnownSet() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify([...knownSet]));
    }

    let knownSet = loadKnownSet();

    // Deck: we filteren bekende woorden eruit (dus worden niet meer gevraagd)
    let deck = [];
    let index = 0;
    let showingFront = true;

    // Richting: EN_NL (front=EN back=NL) of NL_EN (front=NL back=EN)
    let direction = "EN_NL";

    const cardTextEl = document.getElementById("cardText");
    const statusLineEl = document.getElementById("statusLine");
    const directionEl = document.getElementById("direction");
    const knownCheckboxEl = document.getElementById("knownCheckbox");
    const emptyStateEl = document.getElementById("emptyState");

    function frontText(card) {
      return direction === "EN_NL" ? card.en : card.nl;
    }

    function backText(card) {
      return direction === "EN_NL" ? card.nl : card.en;
    }

    function rebuildDeck(keepCurrent = true) {
      const currentId = deck.length > 0 ? cardId(deck[index]) : null;

      deck = baseCards.filter(c => !knownSet.has(cardId(c)));

      // Als we de huidige kaart willen behouden (en die bestaat nog), dan index daarop zetten
      if (keepCurrent && currentId) {
        const newIndex = deck.findIndex(c => cardId(c) === currentId);
        index = newIndex >= 0 ? newIndex : 0;
      } else {
        index = 0;
      }

      renderCard();
    }

    function updateStatus() {
      const totalAll = baseCards.length;
      const knownCount = knownSet.size;
      const totalActive = deck.length;
      const dirLabel = direction === "EN_NL" ? "Engels → Nederlands" : "Nederlands → Engels";

      if (totalActive > 0) {
        statusLineEl.textContent = `${dirLabel} • kaart ${index + 1} van ${totalActive} • bekend: ${knownCount} • totaal: ${totalAll}`;
      } else {
        statusLineEl.textContent = `${dirLabel} • bekend: ${knownCount} • totaal: ${totalAll}`;
      }
    }

    function syncKnownCheckbox() {
      if (deck.length === 0) {
        knownCheckboxEl.checked = false;
        knownCheckboxEl.disabled = true;
        return;
      }
      knownCheckboxEl.disabled = false;
      const id = cardId(deck[index]);
      knownCheckboxEl.checked = knownSet.has(id);
    }

    function renderCard() {
      showingFront = true;

      if (deck.length === 0) {
        cardTextEl.textContent = "🎉 Alles bekend!";
        emptyStateEl.style.display = "block";
        emptyStateEl.textContent = "Je hebt alle woorden als 'bekend' aangevinkt. Klik op 'Bekenden wissen' om opnieuw te beginnen.";
        syncKnownCheckbox();
        updateStatus();
        return;
      }

      emptyStateEl.style.display = "none";
      cardTextEl.textContent = frontText(deck[index]);
      syncKnownCheckbox();
      updateStatus();
    }

    function flipCard() {
      if (deck.length === 0) return;
      const card = deck[index];
      cardTextEl.textContent = showingFront ? backText(card) : frontText(card);
      showingFront = !showingFront;
    }

    function nextCard() {
      if (deck.length === 0) return;
      index = (index + 1) % deck.length;
      renderCard();
    }

    function prevCard() {
      if (deck.length === 0) return;
      index = (index - 1 + deck.length) % deck.length;
      renderCard();
    }

    function shuffleCards() {
      if (deck.length === 0) return;
      for (let i = deck.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [deck[i], deck[j]] = [deck[j], deck[i]];
      }
      index = 0;
      renderCard();
    }

    function resetOrder() {
      // Reset = opnieuw opbouwen (bekenden blijven bekend!)
      rebuildDeck(false);
    }

    function setDirection(newDir) {
      direction = newDir;
      renderCard();
    }

    function toggleKnown(isChecked) {
      if (deck.length === 0) return;

      const id = cardId(deck[index]);

      if (isChecked) {
        knownSet.add(id);
      } else {
        knownSet.delete(id);
      }
      saveKnownSet();

      // Belangrijk: deck opnieuw bouwen (want bekende woorden moeten verdwijnen)
      rebuildDeck(false);
    }

    function clearKnown() {
      knownSet = new Set();
      saveKnownSet();
      rebuildDeck(false);
    }

    // Keyboard support
    document.addEventListener("keydown", (e) => {
      if (e.code === "Space") { e.preventDefault(); flipCard(); }
      if (e.code === "ArrowRight") nextCard();
      if (e.code === "ArrowLeft") prevCard();
    });

    // Init
    directionEl.value = direction;
    rebuildDeck(false);
  </script>
</body>
</html>
