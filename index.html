<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <title>Flashcards EN-NL</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #f4f4f4;
      padding: 40px;
    }
    .card {
      background: white;
      width: 360px;
      margin: 0 auto 14px;
      padding: 28px 24px;
      border-radius: 10px;
      font-size: 22px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.10);
      cursor: pointer;
      user-select: none;
      line-height: 1.35;
    }
    .meta {
      color: #666;
      font-size: 14px;
      margin-bottom: 18px;
    }
    button {
      padding: 10px 18px;
      font-size: 16px;
      cursor: pointer;
      margin: 0 6px;
    }
  </style>
</head>
<body>

  <h1>📘 Flashcards (Engels → Nederlands)</h1>
  <div class="meta">
    Klik op de kaart om te flippen. Gebruik Volgende/Vorige om te navigeren.
  </div>

  <div class="card" onclick="flipCard()">
    <div id="cardText">insurance</div>
  </div>

  <div>
    <button onclick="prevCard()">Vorige</button>
    <button onclick="nextCard()">Volgende</button>
    <button onclick="shuffleCards()">Shuffle</button>
  </div>

  <script>
    // Woordenlijst uit de foto (1312 t/m 1363)
    const cards = [
      { question: "insurance",      answer: "verzekering" },
      { question: "nurse",          answer: "verpleegster; verpleegkundige" },
      { question: "to divide",      answer: "verdelen" },
      { question: "length",         answer: "lengte" },
      { question: "investigation",  answer: "onderzoek" },
      { question: "package",        answer: "pakket" },
      { question: "somewhere",      answer: "ergens" },
      { question: "to expand",      answer: "uitbreiden" },
      { question: "to commit",      answer: "begaan" },
      { question: "obvious",        answer: "voor de hand liggend" },
      { question: "to jump",        answer: "springen" },
      { question: "weapon",         answer: "wapen" },
      { question: "relatively",     answer: "naar verhouding" },
      { question: "host",           answer: "gastheer" },
      { question: "winter",         answer: "winter" },
      { question: "district",       answer: "wijk; gebied" },
      { question: "broad",          answer: "breed" },
      { question: "tire",           answer: "band" },
      { question: "spring",         answer: "lente" },
      { question: "spirit",         answer: "geest" },
      { question: "lunch",          answer: "lunch" },
      { question: "actual",         answer: "actueel; eigenlijk; werkelijk" },
      { question: "pool",           answer: "zwembad" },
      { question: "battle",         answer: "strijd" },
      { question: "tradition",      answer: "traditie" },
      { question: "cash",           answer: "contant geld" },

      { question: "hardly",         answer: "nauwelijks" },
      { question: "award",          answer: "prijs" },
      { question: "coach",          answer: "trainer" },
      { question: "experiment",     answer: "experiment" },
      { question: "consideration",  answer: "overweging" },
      { question: "strange",        answer: "vreemd" },
      { question: "code",           answer: "code" },
      { question: "possibly",       answer: "mogelijk" },
      { question: "threat",         answer: "bedreiging" },
      { question: "accident",       answer: "ongeluk" },
      { question: "impossible",     answer: "onmogelijk" },
      { question: "revenue",        answer: "omzet" },
      { question: "to enable",      answer: "mogelijk maken" },
      { question: "afraid",         answer: "bang" },
      { question: "active",         answer: "actief" },
      { question: "to conclude",    answer: "concluderen" },
      { question: "religious",      answer: "religieus; godsdienstig" },
      { question: "cancer",         answer: "kanker" },
      { question: "to convince",    answer: "overtuigen" },
      { question: "to vary",        answer: "variëren" },
      { question: "environmental",  answer: "milieu" },
      { question: "sun",            answer: "zon" },
      { question: "healthy",        answer: "gezond" },
      { question: "to blow",        answer: "blazen; waaien" },
      { question: "volume",         answer: "volume" },
      { question: "location",       answer: "plaats" }
    ];

    let index = 0;
    let showingQuestion = true;

    function renderCard() {
      document.getElementById("cardText").textContent = cards[index].question;
      showingQuestion = true;
    }

    function flipCard() {
      const el = document.getElementById("cardText");
      el.textContent = showingQuestion ? cards[index].answer : cards[index].question;
      showingQuestion = !showingQuestion;
    }

    function nextCard() {
      index = (index + 1) % cards.length;
      renderCard();
    }

    function prevCard() {
      index = (index - 1 + cards.length) % cards.length;
      renderCard();
    }

    function shuffleCards() {
      for (let i = cards.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [cards[i], cards[j]] = [cards[j], cards[i]];
      }
      index = 0;
      renderCard();
    }

    // Start
    renderCard();
  </script>

</body>
</html>
