<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Flashcards EN-NL / NL-EN</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #f4f4f4;
      padding: 32px 16px;
    }
    .container {
      max-width: 520px;
      margin: 0 auto;
    }
    h1 { margin-top: 0; }
    .meta {
      color: #666;
      font-size: 14px;
      margin: 8px 0 18px;
      line-height: 1.4;
    }
    .controls {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }
    select, button {
      padding: 10px 12px;
      font-size: 16px;
      cursor: pointer;
    }
    .card {
      background: white;
      margin: 0 auto 14px;
      padding: 28px 20px;
      border-radius: 12px;
      font-size: 24px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.10);
      cursor: pointer;
      user-select: none;
      line-height: 1.35;
      min-height: 110px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .statusline {
      color: #444;
      font-size: 14px;
      margin-top: 8px;
    }
    .hint {
      font-size: 12px;
      color: #777;
      margin-top: 4px;
    }
    kbd {
      background: #eee;
      border-radius: 4px;
      padding: 2px 6px;
      border: 1px solid #ddd;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📘 Flashcards</h1>

    <div class="meta">
      Kies de richting: <b>Engels → Nederlands</b> of <b>Nederlands → Engels</b>.<br/>
      Klik op de kaart om te flippen.
    </div>

    <div class="controls">
      <select id="direction" onchange="setDirection(this.value)">
        <option value="EN_NL">Engels → Nederlands</option>
        <option value="NL_EN">Nederlands → Engels</option>
      </select>

      <button onclick="prevCard()">Vorige</button>
      <button onclick="nextCard()">Volgende</button>
      <button onclick="shuffleCards()">Shuffle</button>
      <button onclick="resetOrder()">Reset</button>
    </div>

    <div class="card" onclick="flipCard()" title="Klik om te flippen">
      <div id="cardText">insurance</div>
    </div>

    <div class="statusline" id="statusLine"></div>
    <div class="hint">
      Sneltoetsen: <kbd>Spatie</kbd> flip • <kbd>←</kbd> vorige • <kbd>→</kbd> volgende
    </div>
  </div>

  <script>
    // Basiswoordenlijst (zelfde als in jouw voorbeeld)
    // We bewaren elk item als EN + NL, zodat we eenvoudig kunnen wisselen van richting.
    
const baseCards = [
  { en: "experiment",     nl: "experiment" },
  { en: "consideration",  nl: "overweging" },
  { en: "strange",        nl: "vreemd" },
  { en: "code",           nl: "code" },
  { en: "possibly",       nl: "mogelijk" },
  { en: "threat",         nl: "bedreiging" },
  { en: "accident",       nl: "ongeluk" },
  { en: "impossible",     nl: "onmogelijk" },
  { en: "revenue",        nl: "omzet" },
  { en: "to enable",      nl: "mogelijk maken" },
  { en: "afraid",         nl: "bang" },
  { en: "active",         nl: "actief" },
  { en: "to conclude",    nl: "concluderen" },
  { en: "religious",      nl: "religieus; godsdienstig" },
  { en: "cancer",         nl: "kanker" },
  { en: "to convince",    nl: "overtuigen" },
  { en: "to vary",        nl: "variëren" },
  { en: "environmental",  nl: "milieu" },
  { en: "sun",            nl: "zon" },
  { en: "healthy",        nl: "gezond" }
];

    // We werken met een 'deck' (kopie) zodat we kunnen shufflen zonder baseCards te verliezen.
    let deck = [...baseCards];
    let index = 0;
    let showingFront = true;

    // Richting: EN_NL (front=EN back=NL) of NL_EN (front=NL back=EN)
    let direction = "EN_NL";

    const cardTextEl = document.getElementById("cardText");
    const statusLineEl = document.getElementById("statusLine");
    const directionEl = document.getElementById("direction");

    function frontText(card) {
      return direction === "EN_NL" ? card.en : card.nl;
    }

    function backText(card) {
      return direction === "EN_NL" ? card.nl : card.en;
    }

    function updateStatus() {
      const total = deck.length;
      const dirLabel = direction === "EN_NL" ? "Engels → Nederlands" : "Nederlands → Engels";
      statusLineEl.textContent = `${dirLabel} • kaart ${index + 1} van ${total}`;
    }

    function renderCard() {
      showingFront = true;
      cardTextEl.textContent = frontText(deck[index]);
      updateStatus();
    }

    function flipCard() {
      const card = deck[index];
      cardTextEl.textContent = showingFront ? backText(card) : frontText(card);
      showingFront = !showingFront;
    }

    function nextCard() {
      index = (index + 1) % deck.length;
      renderCard();
    }

    function prevCard() {
      index = (index - 1 + deck.length) % deck.length;
      renderCard();
    }

    function shuffleCards() {
      for (let i = deck.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [deck[i], deck[j]] = [deck[j], deck[i]];
      }
      index = 0;
      renderCard();
    }

    function resetOrder() {
      deck = [...baseCards];
      index = 0;
      renderCard();
    }

    function setDirection(newDir) {
      direction = newDir;
      renderCard(); // zorgt dat de kaart meteen in de juiste taal start
    }

    // Keyboard support
    document.addEventListener("keydown", (e) => {
      if (e.code === "Space") { e.preventDefault(); flipCard(); }
      if (e.code === "ArrowRight") nextCard();
      if (e.code === "ArrowLeft") prevCard();
    });

    // Init
    directionEl.value = direction;
    renderCard();
  </script>
</body>
</html>
