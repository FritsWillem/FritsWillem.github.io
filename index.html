<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Flashcards</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: #f4f4f4;
            padding: 40px;
        }
        .card {
            background: white;
            width: 300px;
            margin: 0 auto 20px;
            padding: 30px;
            border-radius: 10px;
            font-size: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            cursor: pointer;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<h1>📘 Flashcards</h1>

<div class="card" onclick="flipCard()">
    <span id="cardText">Wat is de hoofdstad van Frankrijk?</span>
</div>

<button onclick="nextCard()">Volgende</button>

<script>
    const cards = [
        { question: "Wat is de hoofdstad van Frankrijk?", answer: "Parijs" },
        { question: "2 + 2 = ?", answer: "4" },
        { question: "HTML staat voor?", answer: "HyperText Markup Language" }
    ];

    let index = 0;
    let showingQuestion = true;

    function flipCard() {
        const cardText = document.getElementById("cardText");
        if (showingQuestion) {
            cardText.textContent = cards[index].answer;
        } else {
            cardText.textContent = cards[index].question;
        }
        showingQuestion = !showingQuestion;
    }

    function nextCard() {
        index = (index + 1) % cards.length;
        showingQuestion = true;
        document.getElementById("cardText").textContent = cards[index].question;
    }
</script>

</body>
</html>
